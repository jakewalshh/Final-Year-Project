services:
  db:
    image: postgres:17-alpine
    container_name: panion_db
    restart: always
    environment:
      POSTGRES_DB: panion
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d panion"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build: ./backend
    container_name: panion_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=panion_backend.settings
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=panion
      - DB_USER=admin
      - DB_PASSWORD=admin_password

  frontend:
    build: ./frontend
    container_name: panion_frontend
    command: npm start
    restart: unless-stopped
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_BASE_URL=http://localhost:8000/api
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
